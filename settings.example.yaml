# settings.yaml — Operational parameters for fund_rate_arb
# Edit freely when strategy changes. Not tracked in code.
#
# Load order:
#   1. This file (repo root or ~/.config/fund_rate_arb/settings.yaml)
#   2. Environment variables override individual values
#   3. Code defaults if neither present

