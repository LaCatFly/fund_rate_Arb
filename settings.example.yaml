# ---------------------------------------------------------------------------
# Scoring weights — change when you want different signal emphasis
# ---------------------------------------------------------------------------
weights:
  funding_mean: 0.30    # normalized to 0.001 max
  persistence: 0.25     # % positive intervals
  volatility: -0.15     # std dev penalty
  oi_stability: 0.15    # 1 - CV of OI
  spread_cost: -0.10    # bps penalty
  slippage: -0.05       # proportional to spread


# ---------------------------------------------------------------------------
# Fee model — retail tier maker/taker
# ---------------------------------------------------------------------------
fees:
  binance_maker: 0.0002       # 0.02%
  binance_taker: 0.0005       # 0.05%
  hyperliquid_maker: 0.0000   # 0% maker
  hyperliquid_taker: 0.00035  # 0.035%
  slippage: 0.0003            # 0.03%
  spread_cost: 0.0002         # 0.02%


# ---------------------------------------------------------------------------
# Strategy parameters
# ---------------------------------------------------------------------------
strategy:
  # Funding frequency
  funding_intervals_per_day: 3    # every 8h
  # Data collection
  funding_lookback_hours: 24      # how far back to fetch rates
  min_oi_usd: 10_000_000          # $10M minimum open interest to score
  top_n_symbols: 50               # max symbols shown in score table
  min_apy_threshold: 10.0         # default report APY filter
  # Risk
  max_concurrent_positions: 5     # max open positions in PM account
  min_notional: 5.50              # minimum order size in USDT
  default_leverage: 1             # leverage set on PM account init


# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
network:
  binance_proxy: "http://127.0.0.1:7897"   # Clash Meta mixed port
  binance_futures_base: "https://fapi.binance.com"
  hyperliquid_api: "https://api.hyperliquid.xyz"


# ---------------------------------------------------------------------------
# Strategies — per-strategy execution, selection, and exit rules
# ---------------------------------------------------------------------------
strategies:
  - name: funding_carry
    enabled: true
    polling_interval_s: 3600
    weights:
      funding_mean: 0.30
      persistence: 0.25
      volatility: -0.15
      oi_stability: 0.15
      spread_cost: -0.10
      slippage: -0.05
    execution:
      notional_per_leg: 200.0
      max_retries: 5
      retry_delay_s: 2.0
      leverage: 1
    selection:
      top_fraction: 0.10
      max_concurrent_positions: 5
      min_apy_threshold: 15.0
      min_oi_usd: 5_000_000
    exit_rules:
      - type: time_based
        params:
          max_hold_hours: 168
      - type: funding_flip
        params:
          consecutive_neg: 3
      - type: apy_threshold
        params:
          min_apy: 10.0
      - type: max_loss
        params:
          max_loss_pct: 5.0
